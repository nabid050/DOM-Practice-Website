<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>জরুরি সেবা ডিরেক্টরি</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
</head>

<body class="bg-[#edf3ee]">

    <!-- HEADER -->

    <header class="bg-white shadow-sm">
        <div class="container mx-auto px-6 py-3">

            <div class="flex justify-between items-center">

                <div class="flex items-center gap-3">
                    <img src="assets/logo.png" class="w-12 h-12">

                    <div>
                        <h2 class="font-bold text-green-800 leading-none">
                            Emergency
                        </h2>
                        <h3 class="font-bold text-green-800 leading-none">
                            Service
                        </h3>
                    </div>
                </div>

                <div class="flex gap-4">

                    <div class="counter-box">
                        <span id="favCount">0</span>
                        <i class="fa-solid fa-heart text-red-500"></i>
                    </div>

                    <div class="counter-box">
                        <span id="coinCount">100</span>
                        <i class="fa-solid fa-coins text-yellow-500"></i>
                    </div>

                    <button class="copy-counter">
                        <span id="copyCount">0</span>
                        Copy
                    </button>

                </div>
            </div>
        </div>
    </header>

    <!-- HERO -->

    <section class="hero-bg py-8 text-white text-center">

        <img src="assets/logo.png" class="mx-auto w-20 mb-3" />

        <h1 class="text-4xl font-bold">
            জরুরি সেবা ডিরেক্টরি
        </h1>

        <p class="text-sm mt-2">
            Government Emergency Services at Your Fingertip
        </p>

    </section>

    <!-- MAIN -->

    <section class="container mx-auto px-6 py-6">

        <div class="grid lg:grid-cols-4 gap-6">

            <!-- CARD AREA -->

            <div class="lg:col-span-3">

                <div id="cardContainer" class="grid md:grid-cols-2 xl:grid-cols-3 gap-5">
                </div>

            </div>

            <!-- HISTORY -->

            <div class="bg-white rounded-xl p-5 shadow-sm">

                <div class="flex justify-between items-center mb-5">
                    <h3 class="font-semibold">
                        <i class="fa-regular fa-clock"></i>
                        Call History
                    </h3>

                    <button id="clearHistory" class="bg-green-600 text-white px-4 py-2 rounded-full text-sm">
                        Clear
                    </button>
                </div>

                <div id="historyList" class="space-y-3">
                </div>

            </div>

        </div>

    </section>

    <script src="app.js"></script>
</body>

</html>
